<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Kode Beregner V2.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #D20014;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .version {
            text-align: center;
            color: #555;
            font-size: 11px;
            margin-bottom: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .input-section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }
        .input-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #208684;
            font-size: 16px;
        }
        .input-section p {
            margin-bottom: 12px;
            color: #999;
            font-size: 13px;
        }
        textarea {
            width: 100%;
            height: 220px;
            background: #0f0f23;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
        }
        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: #208684;
        }
        .buttons {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-calc {
            background: #D20014;
            color: white;
        }
        .btn-calc:hover {
            background: #9F000F;
        }
        .btn-clear {
            background: #333;
            color: #ccc;
        }
        .btn-clear:hover {
            background: #555;
        }
        .btn-pdf {
            background: #208684;
            color: white;
        }
        .btn-pdf:hover {
            background: #186462;
        }
        .controls-row {
            margin-top: 15px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: end;
        }
        .control-box {
            flex: 1;
            min-width: 240px;
        }
        .control-box label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #208684;
        }
        .control-box select,
        .control-box input {
            width: 100%;
            background: #0f0f23;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 14px;
        }
        .hint {
            margin-top: 6px;
            font-size: 12px;
            color: #777;
        }
        .result-section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #0f3460;
            display: none;
        }
        .result-section h2 {
            color: #208684;
            margin-bottom: 15px;
            font-size: 20px;
        }
        .result-section h3 {
            color: #D20014;
            margin: 25px 0 10px 0;
            font-size: 17px;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 5px;
        }
        .result-section h4 {
            color: #f0a500;
            margin: 18px 0 8px 0;
            font-size: 15px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th {
            background: #0f3460;
            color: #208684;
            padding: 12px 15px;
            text-align: left;
            font-size: 14px;
            border-bottom: 2px solid #208684;
        }
        td {
            padding: 10px 15px;
            border-bottom: 1px solid #1a1a3e;
            font-size: 14px;
        }
        tr:hover {
            background: #1a1a3e;
        }
        .total-row {
            background: #0f3460 !important;
            font-weight: bold;
            color: #D20014;
        }
        .total-row td {
            border-top: 2px solid #208684;
            font-size: 15px;
        }
        .code-val {
            color: #f0a500;
        }
        .time-val {
            color: #4fc3f7;
        }
        .total-val {
            color: #e0e0e0;
        }
        .ignored-info {
            margin-top: 15px;
            padding: 10px 15px;
            background: #1a1a2e;
            border-radius: 8px;
            color: #777;
            font-size: 12px;
        }
        .error-msg {
            color: #D20014;
            background: #2a0a0a;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }
        .success-box {
            margin-top: 15px;
            padding: 12px 15px;
            background: #102a28;
            border: 1px solid #208684;
            border-radius: 8px;
            color: #9fe3d7;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏱️ Stop Kode Beregner</h1>
        <p class="subtitle">Indsæt data fra Excel — beregn stop tid pr. maskine og stopkode</p>
        <p class="version">Version 2.5</p>

        <div class="input-section">
            <label>📋 Indsæt data fra Excel her:</label>
            <p>Forventet format: <strong>Dato (DD-MM-YYYY) [TAB] Maskine [TAB] Stopkode: Navn [TAB] Tid (min)</strong></p>
            <textarea id="dataInput" placeholder="Indsæt dine Excel-data her...

Eksempel:
17-03-2026	PSM01	8: Rengøring	30
17-03-2026	PSM01	11: Maskinstop	15
17-03-2026	PSM02	8: Rengøring	75"></textarea>

            <div class="controls-row">
                <div class="control-box">
                    <label for="groupBy">📅 Gruppér efter:</label>
                    <select id="groupBy">
                        <option value="none">Ingen gruppering (samlet)</option>
                        <option value="uge">Uge</option>
                        <option value="maaned">Måned</option>
                    </select>
                </div>

                <div class="control-box">
                    <label for="codeFilter">🎯 Filtrér stopkoder (valgfrit):</label>
                    <input type="text" id="codeFilter" placeholder="Fx 8,11 eller 1,4,5,11">
                    <div class="hint">Lad feltet være tomt for at tage alle stopkoder med</div>
                </div>
            </div>

            <div class="buttons">
                <button class="btn btn-calc" onclick="beregn()">⚡ Beregn</button>
                <button class="btn btn-clear" onclick="ryd()">🗑️ Ryd</button>
                <button class="btn btn-pdf" id="btnPdf" onclick="downloadPdf()" style="display:none;">📄 Download PDF</button>
            </div>

            <div class="error-msg" id="errorMsg"></div>
            <div class="success-box" id="successBox" style="display:none;"></div>
        </div>

        <div class="result-section" id="resultSection">
            <h2>📊 Resultat — Stop Tider pr. Maskine & Stopkode</h2>
            <div id="resultContent"></div>
            <div class="ignored-info" id="ignoredInfo"></div>
        </div>
    </div>

    <script>
        var STOPKODER = {
            1: "Betjeningsfejl",
            2: "Granulering",
            3: "Klingeskift",
            4: "Maskinfejl",
            5: "Elfejl",
            6: "Uldmangel",
            7: "Udsugningsstop",
            8: "Rengøring",
            9: "Uld-kvalitet",
            10: "Folieskift",
            11: "Maskinstop",
            12: "Force majeure",
            13: "Hente uld",
            14: "Mangler AGV/Udkøre",
            15: "Mangler Hjælpe materialer",
            16: "Hjælp på anden maskine"
        };

        var MASKINE_ORDER = [
            "PSM01",
            "PSM02",
            "Teclict Sav3",
            "Lamelmåtten",
            "Krymperen",
            "RPI XII",
            "Sav 42",
            "Sav 44",
            "Sav 46",
            "Sav 48",
            "Rundsav (Sav35)",
            "Valse",
            "Båndsav 33",
            "Båndsav 34",
            "Båndsav Linje"
        ];

        var MAANEDER = [
            "Januar", "Februar", "Marts", "April", "Maj", "Juni",
            "Juli", "August", "September", "Oktober", "November", "December"
        ];

        var globalResults = null;

        function normalizeName(name) {
            return name.trim().toLowerCase().replace(/\s+/g, ' ');
        }

        function findMaskineMatch(inputName) {
            var norm = normalizeName(inputName);

            for (var i = 0; i < MASKINE_ORDER.length; i++) {
                if (normalizeName(MASKINE_ORDER[i]) === norm) {
                    return MASKINE_ORDER[i];
                }
            }

            for (var j = 0; j < MASKINE_ORDER.length; j++) {
                var orderNorm = normalizeName(MASKINE_ORDER[j]);
                if (orderNorm.indexOf(norm) !== -1 || norm.indexOf(orderNorm) !== -1) {
                    return MASKINE_ORDER[j];
                }
            }

            return null;
        }

        function parseDato(str) {
            var parts = str.trim().split('-');
            if (parts.length !== 3) return null;

            var d = parseInt(parts[0], 10);
            var m = parseInt(parts[1], 10);
            var y = parseInt(parts[2], 10);

            if (isNaN(d) || isNaN(m) || isNaN(y)) return null;

            var date = new Date(y, m - 1, d);
            if (date.getFullYear() !== y || date.getMonth() !== m - 1 || date.getDate() !== d) {
                return null;
            }

            return date;
        }

        function getWeekNumber(date) {
            var d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            var dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return { year: d.getUTCFullYear(), week: weekNo };
        }

        function getPeriodLabel(date, groupBy) {
            if (groupBy === 'uge') {
                var w = getWeekNumber(date);
                return 'Uge ' + w.week + ' - ' + w.year;
            }
            if (groupBy === 'maaned') {
                return MAANEDER[date.getMonth()] + ' ' + date.getFullYear();
            }
            return 'Samlet';
        }

        function getPeriodSortKey(date, groupBy) {
            if (groupBy === 'uge') {
                var w = getWeekNumber(date);
                return w.year * 100 + w.week;
            }
            if (groupBy === 'maaned') {
                return date.getFullYear() * 100 + (date.getMonth() + 1);
            }
            return 1;
        }

        function parseCodeFilter() {
            var val = document.getElementById('codeFilter').value.trim();
            if (!val) return null;

            var parts = val.split(',');
            var allowed = {};
            for (var i = 0; i < parts.length; i++) {
                var n = parseInt(parts[i].trim(), 10);
                if (isNaN(n) || n < 1 || n > 16) {
                    return { error: '⚠️ Ugyldigt kodefilter. Brug fx 8,11 eller 1,4,5,11' };
                }
                allowed[n] = true;
            }
            return { allowed: allowed };
        }

        function beregn() {
            var raw = document.getElementById('dataInput').value.trim();
            var errorEl = document.getElementById('errorMsg');
            var successBox = document.getElementById('successBox');
            var resultSection = document.getElementById('resultSection');
            var resultContent = document.getElementById('resultContent');
            var ignoredInfo = document.getElementById('ignoredInfo');
            var groupBy = document.getElementById('groupBy').value;
            var btnPdf = document.getElementById('btnPdf');

            errorEl.style.display = 'none';
            successBox.style.display = 'none';
            resultSection.style.display = 'none';
            btnPdf.style.display = 'none';
            resultContent.innerHTML = '';
            ignoredInfo.innerHTML = '';
            globalResults = null;

            if (!raw) {
                errorEl.textContent = '⚠️ Indsæt venligst data først!';
                errorEl.style.display = 'block';
                return;
            }

            var filterResult = parseCodeFilter();
            if (filterResult && filterResult.error) {
                errorEl.textContent = filterResult.error;
                errorEl.style.display = 'block';
                return;
            }

            var allowedCodes = filterResult ? filterResult.allowed : null;

            var lines = raw.split('\n');
            var entries = [];
            var ignoredLines = 0;
            var filteredOutLines = 0;
            var unknownMachineNames = {};

            for (var li = 0; li < lines.length; li++) {
                var line = lines[li].trim();
                if (!line) continue;

                var parts = line.split('\t');
                if (parts.length < 4) {
                    ignoredLines++;
                    continue;
                }

                var datoStr = parts[0].trim();
                var maskineStr = parts[1].trim();
                var kodeStr = parts[2].trim();
                var tidStr = parts[3].trim().replace(',', '.');

                var dato = parseDato(datoStr);
                var tid = parseFloat(tidStr);

                var kodeMatch = kodeStr.match(/^(\d+)/);
                var kode = kodeMatch ? parseInt(kodeMatch[1], 10) : null;

                if (!dato || !kode || kode < 1 || kode > 16 || isNaN(tid)) {
                    ignoredLines++;
                    continue;
                }

                if (allowedCodes && !allowedCodes[kode]) {
                    filteredOutLines++;
                    continue;
                }

                var matchedMaskine = findMaskineMatch(maskineStr);
                if (!matchedMaskine) {
                    unknownMachineNames[maskineStr] = true;
                    matchedMaskine = maskineStr;
                }

                entries.push({
                    dato: dato,
                    maskine: matchedMaskine,
                    kode: kode,
                    tid: tid
                });
            }

            if (entries.length === 0) {
                errorEl.textContent = '⚠️ Ingen gyldige data at beregne på!';
                errorEl.style.display = 'block';
                return;
            }

            var grouped = {};
            var periodMeta = {};

            for (var ei = 0; ei < entries.length; ei++) {
                var entry = entries[ei];
                var periodLabel = getPeriodLabel(entry.dato, groupBy);
                var periodKey = groupBy === 'none' ? 'Samlet' : periodLabel;

                if (!grouped[periodKey]) grouped[periodKey] = {};
                if (!grouped[periodKey][entry.maskine]) grouped[periodKey][entry.maskine] = {};
                if (!grouped[periodKey][entry.maskine][entry.kode]) grouped[periodKey][entry.maskine][entry.kode] = 0;

                grouped[periodKey][entry.maskine][entry.kode] += entry.tid;

                if (!periodMeta[periodKey]) {
                    periodMeta[periodKey] = {
                        label: periodLabel,
                        sortKey: getPeriodSortKey(entry.dato, groupBy)
                    };
                }
            }

            var periodKeys = Object.keys(grouped).sort(function(a, b) {
                return periodMeta[a].sortKey - periodMeta[b].sortKey;
            });

            var html = '';

            for (var pk = 0; pk < periodKeys.length; pk++) {
                var periodKey = periodKeys[pk];
                var machineMap = grouped[periodKey];

                if (groupBy !== 'none') {
                    html += '<h3>📅 ' + periodKey + '</h3>';
                } else {
                    html += '<h3>📅 Samlet resultat</h3>';
                }

                var machines = Object.keys(machineMap).sort(function(a, b) {
                    var ia = MASKINE_ORDER.indexOf(a);
                    var ib = MASKINE_ORDER.indexOf(b);

                    if (ia === -1 && ib === -1) return a.localeCompare(b, 'da');
                    if (ia === -1) return 1;
                    if (ib === -1) return -1;
                    return ia - ib;
                });

                for (var mi = 0; mi < machines.length; mi++) {
                    var maskine = machines[mi];
                    var kodeMap = machineMap[maskine];

                    html += '<h4>🏭 ' + maskine + '</h4>';
                    html += '<table>';
                    html += '<thead><tr><th>Stopkode</th><th>Navn</th><th>Minutter</th></tr></thead><tbody>';

                    var total = 0;
                    var codes = Object.keys(kodeMap).map(Number).sort(function(a, b) { return a - b; });

                    for (var ci = 0; ci < codes.length; ci++) {
                        var kode = codes[ci];
                        var tid = kodeMap[kode];
                        total += tid;

                        html += '<tr>' +
                            '<td class="code-val">' + kode + '</td>' +
                            '<td>' + STOPKODER[kode] + '</td>' +
                            '<td class="time-val">' + formatNumber(tid) + '</td>' +
                            '</tr>';
                    }

                    html += '<tr class="total-row">' +
                        '<td colspan="2">Total</td>' +
                        '<td class="total-val">' + formatNumber(total) + '</td>' +
                        '</tr>';

                    html += '</tbody></table>';
                }
            }

            resultContent.innerHTML = html;

            var ignoredText = 'Ignorerede linjer: ' + ignoredLines;
            if (filteredOutLines > 0) {
                ignoredText += ' | Frasorterede linjer via kodefilter: ' + filteredOutLines;
            }

            var unknownNames = Object.keys(unknownMachineNames);
            if (unknownNames.length > 0) {
                ignoredText += '<br>Ukendte maskinnavne fundet: ' + unknownNames.join(', ');
            }

            ignoredInfo.innerHTML = ignoredText;

            var filterText = 'Alle stopkoder';
            if (allowedCodes) {
                var selectedCodes = Object.keys(allowedCodes).map(Number).sort(function(a, b) { return a - b; });
                filterText = 'Kun koder: ' + selectedCodes.join(', ');
            }

            successBox.innerHTML = '✅ Beregning gennemført. ' + entries.length + ' linjer behandlet. Filter: ' + filterText + '.';
            successBox.style.display = 'block';

            resultSection.style.display = 'block';
            btnPdf.style.display = 'inline-block';

            globalResults = {
                grouped: grouped,
                periodMeta: periodMeta,
                groupBy: groupBy,
                usedFilter: allowedCodes
            };
        }

        function formatNumber(num) {
            return num.toLocaleString('da-DK', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            });
        }

        function ryd() {
            document.getElementById('dataInput').value = '';
            document.getElementById('codeFilter').value = '';
            document.getElementById('groupBy').value = 'none';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successBox').style.display = 'none';
            document.getElementById('btnPdf').style.display = 'none';
            document.getElementById('resultContent').innerHTML = '';
            document.getElementById('ignoredInfo').innerHTML = '';
            globalResults = null;
        }

        function downloadPdf() {
            if (!globalResults) {
                alert('Ingen resultater at eksportere endnu.');
                return;
            }

            var jsPDF = window.jspdf.jsPDF;
            var doc = new jsPDF('p', 'mm', 'a4');

            var grouped = globalResults.grouped;
            var periodMeta = globalResults.periodMeta;
            var groupBy = globalResults.groupBy;

            var periodKeys = Object.keys(grouped).sort(function(a, b) {
                return periodMeta[a].sortKey - periodMeta[b].sortKey;
            });

            var firstPage = true;

            for (var pk = 0; pk < periodKeys.length; pk++) {
                var periodKey = periodKeys[pk];
                var machineMap = grouped[periodKey];

                var machines = Object.keys(machineMap).sort(function(a, b) {
                    var ia = MASKINE_ORDER.indexOf(a);
                    var ib = MASKINE_ORDER.indexOf(b);

                    if (ia === -1 && ib === -1) return a.localeCompare(b, 'da');
                    if (ia === -1) return 1;
                    if (ib === -1) return -1;
                    return ia - ib;
                });

                for (var mi = 0; mi < machines.length; mi++) {
                    var maskine = machines[mi];
                    var kodeMap = machineMap[maskine];

                    if (!firstPage) {
                        doc.addPage();
                    }
                    firstPage = false;

                    doc.setFillColor(210, 0, 20);
                    doc.rect(0, 0, 210, 18, 'F');

                    doc.setTextColor(255, 255, 255);
                    doc.setFontSize(16);
                    doc.text('Stop Kode Beregner V2.5', 14, 11);

                    doc.setTextColor(32, 134, 132);
                    doc.setFontSize(13);
                    doc.text('Maskine: ' + maskine, 14, 28);

                    doc.setTextColor(101, 101, 101);
                    doc.setFontSize(11);
                    if (groupBy === 'none') {
                        doc.text('Periode: Samlet', 14, 35);
                    } else {
                        doc.text('Periode: ' + periodKey, 14, 35);
                    }

                    var rows = [];
                    var total = 0;
                    var codes = Object.keys(kodeMap).map(Number).sort(function(a, b) { return a - b; });

                    for (var ci = 0; ci < codes.length; ci++) {
                        var kode = codes[ci];
                        var tid = kodeMap[kode];
                        total += tid;

                        rows.push([
                            kode,
                            STOPKODER[kode],
                            formatNumber(tid)
                        ]);
                    }

                    rows.push([
                        '',
                        'Total',
                        formatNumber(total)
                    ]);

                    doc.autoTable({
                        startY: 42,
                        head: [['Stopkode', 'Navn', 'Minutter']],
                        body: rows,
                        theme: 'grid',
                        styles: {
                            fontSize: 10,
                            cellPadding: 3
                        },
                        headStyles: {
                            fillColor: [15, 52, 96],
                            textColor: [32, 134, 132]
                        },
                        alternateRowStyles: {
                            fillColor: [245, 245, 245]
                        },
                        bodyStyles: {
                            textColor: [40, 40, 40]
                        },
                        didParseCell: function(data) {
                            if (data.row.index === rows.length - 1) {
                                data.cell.styles.fillColor = [15, 52, 96];
                                data.cell.styles.textColor = [210, 0, 20];
                                data.cell.styles.fontStyle = 'bold';
                            }
                        }
                    });

                    doc.setFontSize(9);
                    doc.setTextColor(120, 120, 120);
                    doc.text('Genereret: ' + new Date().toLocaleString('da-DK'), 14, 285);
                }
            }

            doc.save('stopkode_beregner_v2_5.pdf');
        }
    </script>
</body>
</html>
