<script>
// --- V3.9 compatibility fixes ---
function formatYearTotalLabel(year){
  return 'ÅRSTOTAL ' + year;
}
function getYearTotalsForMachine(machineName, data){
  const yearMap = {};
  const rows = Array.isArray(data) ? data : (typeof globalEntries !== 'undefined' ? globalEntries : []);
  rows.forEach(row => {
    if (!row) return;
    const m = row.machine || row.maskine || row.machineName || '';
    if (String(m).trim() !== String(machineName).trim()) return;
    const d = row.date || row.dato || row.month || '';
    let year = '';
    if (typeof d === 'string') {
      const m1 = d.match(/(20\d{2})/);
      if (m1) year = m1[1];
    }
    if (!year) year = String(new Date().getFullYear());
    if (!yearMap[year]) yearMap[year] = {};
    const code = String(row.kode || row.code || '');
    const minutes = Number(row.tid || row.minutes || row.minutter || row.duration || 0) || 0;
    yearMap[year][code] = (yearMap[year][code] || 0) + minutes;
  });
  return yearMap;
}

document.addEventListener('DOMContentLoaded', function(){
  ['results','result','output','summary'].forEach(function(id){
    var el = document.getElementById(id);
    if(el) el.style.display = 'none';
  });
});
</script>

<script>
var STOPKODER = {
    1: "Betjeningsfejl",
    2: "Granulering",
    3: "Klingeskift",
    4: "Maskinfejl",
    5: "Elfejl",
    6: "Uldmangel",
    7: "Udsugningsstop",
    8: "Rengøring",
    9: "Uld-kvalitet",
    10: "Folieskift",
    11: "Maskinstop",
    12: "Force majeure",
    13: "Hente uld",
    14: "Mangler AGV/Udkøre",
    15: "Mangler Hjælpe materialer",
    16: "Hjælp på anden maskine"
};

var MASKINE_ORDER = [
    "PSM01", "PSM02", "Teclict Sav3", "Lamelmåtten", "Krymperen",
    "RPI XII", "Sav 42", "Sav 44", "Sav 46", "Sav 48",
    "Rundsav (Sav4_0)", "Valse", "Båndsav 33", "Båndsav 34", "Båndsav Linje"
];

var MAANEDER = [
    "Januar", "Februar", "Marts", "April", "Maj", "Juni",
    "Juli", "August", "September", "Oktober", "November", "December"
];

var globalEntries = [];
var globalParsedMeta = null;

function normalizeName(name) {
    return name.trim().toLowerCase().replace(/\s+/g, ' ');
}

function findMaskineMatch(inputName) {
    var norm = normalizeName(inputName);
    for (var i = 0; i < MASKINE_ORDER.length; i++) {
        if (normalizeName(MASKINE_ORDER[i]) === norm) return MASKINE_ORDER[i];
    }
    for (var j = 0; j < MASKINE_ORDER.length; j++) {
        var orderNorm = normalizeName(MASKINE_ORDER[j]);
        if (orderNorm.indexOf(norm) !== -1 || norm.indexOf(orderNorm) !== -1) return MASKINE_ORDER[j];
    }
    return inputName.trim();
}

function parseDato(str) {
    var parts = str.trim().split('-');
    if (parts.length !== 3) return null;
    var d = parseInt(parts[0], 10);
    var m = parseInt(parts[1], 10);
    var y = parseInt(parts[2], 10);
    if (isNaN(d) || isNaN(m) || isNaN(y)) return null;
    var dt = new Date(y, m - 1, d);
    if (isNaN(dt.getTime())) return null;
    if (dt.getDate() !== d || dt.getMonth() !== m - 1 || dt.getFullYear() !== y) return null;
    return dt;
}

function parseInputDateValue(value) {
    if (!value) return null;
    var parts = value.split("-");
    if (parts.length !== 3) return null;
    var y = parseInt(parts[0], 10);
    var m = parseInt(parts[1], 10);
    var d = parseInt(parts[2], 10);
    if (isNaN(y) || isNaN(m) || isNaN(d)) return null;
    return new Date(y, m - 1, d);
}

function getWeekNumber(date) {
    var d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    var dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    return { year: d.getUTCFullYear(), week: weekNo };
}

function getMonthKey(date) {
    return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
}

function getYearKey(date) {
    return String(date.getFullYear());
}

function getMonthLabel(monthKey) {
    var parts = monthKey.split("-");
    var year = parts[0];
    var monthIndex = parseInt(parts[1], 10) - 1;
    return MAANEDER[monthIndex] + " " + year;
}

function getWeekLabel(weekObj) {
    return "Uge " + weekObj.week + " (" + weekObj.year + ")";
}

function formatMinutes(val) {
    return Number(val || 0).toFixed(1).replace(/\.0$/, "");
}

function escapeHtml(text) {
    return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function formatMinutesPdf(val) {
    return Number(val || 0).toFixed(2).replace(".", ",");
}

function getYearRowsForMachine(machineEntries) {
    var yearEntryMap = {};
    for (var i = 0; i < machineEntries.length; i++) {
        var yearKey = getYearKey(machineEntries[i].dato);
        if (!yearEntryMap[yearKey]) yearEntryMap[yearKey] = [];
        yearEntryMap[yearKey].push(machineEntries[i]);
    }
    var result = {};
    var yearKeys = Object.keys(yearEntryMap).sort();
    for (var y = 0; y < yearKeys.length; y++) {
        var year = yearKeys[y];
        result[year] = aggregateCodes(yearEntryMap[year]).map(function(r) {
            return { code: r.kode, name: r.navn, minutes: r.tid };
        });
    }
    return result;
}


function aggregateCodes(entries) {
    var map = {};
    for (var i = 0; i < entries.length; i++) {
        var kode = entries[i].kode;
        if (!map[kode]) map[kode] = 0;
        map[kode] += entries[i].tid;
    }
    var arr = [];
    for (var k = 1; k <= 16; k++) {
        if (map[k]) {
            arr.push({ kode: k, navn: STOPKODER[k] || ("Kode " + k), tid: map[k] });
        }
    }
    arr.sort(function(a, b) { return b.tid - a.tid; });
    return arr;
}

function getTopRowClass(index) {
    if (index === 0) return "row-top-1";
    if (index === 1) return "row-top-2";
    if (index === 2) return "row-top-3";
    return "";
}

function buildTableHtml(rows, title) {
    var html = "<h4>" + escapeHtml(title) + "</h4>";
    html += "<table>";
    html += "<thead><tr><th>Stopkode</th><th>Navn</th><th>Stop tid (min)</th></tr></thead><tbody>";
    var total = 0;
    for (var i = 0; i < rows.length; i++) {
        total += rows[i].tid;
        var rowClass = getTopRowClass(i);
        html += "<tr" + (rowClass ? " class='" + rowClass + "'" : "") + ">";
        html += "<td>" + rows[i].kode + "</td>";
        html += "<td>" + escapeHtml(rows[i].navn) + "</td>";
        html += "<td>" + formatMinutes(rows[i].tid) + "</td>";
        html += "</tr>";
    }
    html += "<tr class='total-row'><td colspan='2'>Total</td><td>" + formatMinutes(total) + "</td></tr>";
    html += "</tbody></table>";
    return html;
}

function showError(msg) {
    var el = document.getElementById("errorMsg");
    el.textContent = msg;
    el.style.display = "block";
    document.getElementById("successMsg").style.display = "none";
}

function showSuccess(msg) {
    var el = document.getElementById("successMsg");
    el.textContent = msg;
    el.style.display = "block";
    document.getElementById("errorMsg").style.display = "none";
}

function clearMessages() {
    document.getElementById("errorMsg").style.display = "none";
    document.getElementById("successMsg").style.display = "none";
}




function populateFilters(entries) {
    var machineSelect = document.getElementById("filterMachine");
    var monthSelect = document.getElementById("filterMonth");
    var currentMachine = machineSelect.value;
    var currentMonth = monthSelect.value;
    var machines = {};
    var months = {};
    for (var i = 0; i < entries.length; i++) {
        machines[entries[i].maskine] = true;
        months[getMonthKey(entries[i].dato)] = true;
    }
    var machines = Object.keys(machines).sort(function(a, b) {
        var ia = MASKINE_ORDER.indexOf(a);
        var ib = MASKINE_ORDER.indexOf(b);
        if (ia === -1 && ib === -1) return a.localeCompare(b, 'da');
        if (ia === -1) return 1;
        if (ib === -1) return -1;
        return ia - ib;
    });
    var monthList = Object.keys(months).sort();

    machineSelect.innerHTML = '<option value="">Alle maskiner</option>';
    for (var m = 0; m < machines.length; m++) {
        machineSelect.innerHTML += '<option value="' + escapeHtml(machines[m]) + '">' + escapeHtml(machines[m]) + '</option>';
    }

    monthSelect.innerHTML = '<option value="">Alle måneder</option>';
    for (var mo = 0; mo < monthList.length; mo++) {
        monthSelect.innerHTML += '<option value="' + monthList[mo] + '">' + getMonthLabel(monthList[mo]) + '</option>';
    }

    if (machines.indexOf(currentMachine) !== -1) machineSelect.value = currentMachine;
    if (monthList.indexOf(currentMonth) !== -1) monthSelect.value = currentMonth;

    buildPdfMachineList(machines);
    buildStopkodeFilter();
}

function buildPdfMachineList(machines) {
    var container = document.getElementById("pdfMachineList");
    var section = document.getElementById("pdfFilterSection");
    var currentSelected = getSelectedPdfMachines();
    var useCurrent = currentSelected.length > 0;
    container.innerHTML = "";
    if (!machines.length) {
        section.style.display = "none";
        return;
    }
    for (var i = 0; i < machines.length; i++) {
        var machine = machines[i];
        var checked = !useCurrent || currentSelected.indexOf(machine) !== -1;
        container.innerHTML += '<label><input type="checkbox" class="pdf-machine-check" value="' + escapeHtml(machine) + '"' + (checked ? ' checked' : '') + '> ' + escapeHtml(machine) + '</label>';
    }
    section.style.display = "block";
}

function buildStopkodeFilter() {
    var container = document.getElementById("stopkodeList");
    var section = document.getElementById("stopkodeFilterSection");
    var currentSelected = getSelectedStopkoder();
    var useCurrent = currentSelected.length > 0;
    container.innerHTML = "";
    for (var k = 1; k <= 16; k++) {
        var checked = !useCurrent || currentSelected.indexOf(k) !== -1;

}

function parseData(raw) {
    var lines = raw.split(/\r?\n/);
    var entries = [];
    var ignoredLines = 0;
    var unknownMachineNames = {};
    for (var li = 0; li < lines.length; li++) {
        var line = lines[li].trim();
        if (!line) continue;
        var parts = line.split('\t');
        if (parts.length < 4) {
            ignoredLines++;
            continue;
        }
        var datoStr = parts[0].trim();
        var maskineStr = parts[1].trim();
        var kodeStr = parts[2].trim();
        var tidStr = parts[3].trim().replace(",", ".");
        var dato = parseDato(datoStr);
        var tid = parseFloat(tidStr);
        var kodeMatch = kodeStr.match(/^(\d+)/);
        var kode = kodeMatch ? parseInt(kodeMatch[1], 10) : null;
        if (!dato || isNaN(tid) || kode === null || kode < 1 || kode > 16) {
            ignoredLines++;
            continue;
        }
        var matchedMaskine = findMaskineMatch(maskineStr);
        if (MASKINE_ORDER.indexOf(matchedMaskine) === -1 && normalizeName(matchedMaskine) === normalizeName(maskineStr)) {
            unknownMachineNames[maskineStr] = true;
        }
        entries.push({ dato: dato, maskine: matchedMaskine, kode: kode, tid: tid });
    }
    return {
        entries: entries,
        ignoredLines: ignoredLines,
        unknownMachineNames: Object.keys(unknownMachineNames)
    };
}

function getFilteredEntries() {
    var entries = globalEntries.slice();
    var selectedMachine = document.getElementById("filterMachine").value;
    var selectedMonth = document.getElementById("filterMonth").value;
    var selectedCodes = getSelectedStopkoder();
    var dateRangeEnabled = document.getElementById("enableDateRange").checked;
    var dateFrom = parseInputDateValue(document.getElementById("dateFrom").value);
    var dateTo = parseInputDateValue(document.getElementById("dateTo").value);

    if (selectedMachine) {
        entries = entries.filter(function(e) { return e.maskine === selectedMachine; });
    }
    if (selectedMonth) {
        entries = entries.filter(function(e) { return getMonthKey(e.dato) === selectedMonth; });
    }
    if (selectedCodes.length) {
        entries = entries.filter(function(e) { return selectedCodes.indexOf(e.kode) !== -1; });
    } else {
        entries = [];
    }
    if (dateRangeEnabled) {
        if (dateFrom) {
            entries = entries.filter(function(e) { return e.dato >= dateFrom; });
        }
        if (dateTo) {
            var end = new Date(dateTo.getFullYear(), dateTo.getMonth(), dateTo.getDate(), 23, 59, 59, 999);
            entries = entries.filter(function(e) { return e.dato <= end; });
        }
    }
    return entries;
}

function sortMachineList(list) {
    return list.sort(function(a, b) {
        var ia = MASKINE_ORDER.indexOf(a);
        var ib = MASKINE_ORDER.indexOf(b);
        if (ia === -1 && ib === -1) return a.localeCompare(b, 'da');
        if (ia === -1) return 1;
        if (ib === -1) return -1;
        return ia - ib;
    });
}

function buildPeriodBlocks(machineEntries, mode) {
    var blocks = [];
    if (mode === "maaned") {
        var monthMap = {};
        for (var i = 0; i < machineEntries.length; i++) {
            var mk = getMonthKey(machineEntries[i].dato);
            if (!monthMap[mk]) monthMap[mk] = [];
            monthMap[mk].push(machineEntries[i]);
        }
        var monthKeys = Object.keys(monthMap).sort();
        for (var m = 0; m < monthKeys.length; m++) {
            blocks.push({
                type: "month",
                key: monthKeys[m],
                title: getMonthLabel(monthKeys[m]),
                rows: aggregateCodes(monthMap[monthKeys[m]])
            });
        }
    } else if (mode === "uge") {
        var weekMap = {};
        for (var j = 0; j < machineEntries.length; j++) {
            var w = getWeekNumber(machineEntries[j].dato);
            var wk = w.year + "-W" + String(w.week).padStart(2, "0");
            if (!weekMap[wk]) weekMap[wk] = { info: w, entries: [] };
            weekMap[wk].entries.push(machineEntries[j]);
        }
        var weekKeys = Object.keys(weekMap).sort();
        for (var wi = 0; wi < weekKeys.length; wi++) {
            blocks.push({
                type: "week",
                key: weekKeys[wi],
                title: getWeekLabel(weekMap[weekKeys[wi]].info),
                rows: aggregateCodes(weekMap[weekKeys[wi]].entries)
            });
        }
    } else {
        var comboMonthMap = {};
        for (var x = 0; x < machineEntries.length; x++) {
            var cmk = getMonthKey(machineEntries[x].dato);
            if (!comboMonthMap[cmk]) comboMonthMap[cmk] = [];
            comboMonthMap[cmk].push(machineEntries[x]);
        }
        var comboMonthKeys = Object.keys(comboMonthMap).sort();
        for (var ci = 0; ci < comboMonthKeys.length; ci++) {
            var monthKey = comboMonthKeys[ci];
            var monthEntries = comboMonthMap[monthKey];
            blocks.push({
                type: "month",
                key: monthKey,
                title: getMonthLabel(monthKey) + " - Månedstotal",
                rows: aggregateCodes(monthEntries)
            });

            var nestedWeekMap = {};
            for (var y = 0; y < monthEntries.length; y++) {
                var ww = getWeekNumber(monthEntries[y].dato);
                var nwk = ww.year + "-W" + String(ww.week).padStart(2, "0");
                if (!nestedWeekMap[nwk]) nestedWeekMap[nwk] = { info: ww, entries: [] };
                nestedWeekMap[nwk].entries.push(monthEntries[y]);
            }
            var nestedWeekKeys = Object.keys(nestedWeekMap).sort();
            for (var n = 0; n < nestedWeekKeys.length; n++) {
                blocks.push({
                    type: "week",
                    key: nestedWeekKeys[n],
                    title: getMonthLabel(monthKey) + " - " + getWeekLabel(nestedWeekMap[nestedWeekKeys[n]].info),
                    rows: aggregateCodes(nestedWeekMap[nestedWeekKeys[n]].entries)
                });
            }
        }
    }
    return blocks;
}


function buildYearSectionHtml(yearRows, yearLabel) {
    yearRows = Array.isArray(yearRows) ? yearRows : [];
    yearLabel = yearLabel || "Årstotal";
    const total = yearRows.reduce((sum, row) => sum + (Number(row.minutes || row.tid) || 0), 0);
    if (!yearRows.length) {
        return `
        <div class="section-card year-total-section">
            <h3>${escapeHtml(yearLabel)}</h3>
            <div class="table-wrap">
                <table class="results-table">
                    <thead>
                        <tr><th>Stopkode</th><th>Navn</th><th>Stop tid (min)</th></tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="3">Ingen data</td></tr>
                    </tbody>
                </table>
            </div>
        </div>`;
    }
    const rowsHtml = yearRows.map(function(r) {
        var code = r.code != null ? r.code : r.kode;
        var name = r.name != null ? r.name : r.navn;
        var minutes = Number(r.minutes != null ? r.minutes : r.tid) || 0;
        return `
        <tr>
            <td>${escapeHtml(String(code || ''))}</td>
            <td>${escapeHtml(String(name || ''))}</td>
            <td>${minutes.toFixed(2)}</td>
        </tr>`;
    }).join('');
    return `
    <div class="section-card year-total-section">
        <h3>${escapeHtml(yearLabel)}</h3>
        <div class="table-wrap">
            <table class="results-table">
                <thead>
                    <tr><th>Stopkode</th><th>Navn</th><th>Stop tid (min)</th></tr>
                </thead>
                <tbody>
                    ${rowsHtml}
                    <tr class="total-row">
                        <td colspan="2"><strong>${escapeHtml(yearLabel)}</strong></td>
                        <td><strong>${total.toFixed(2)}</strong></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>`;
}

function renderResults() {
  ["results","result","output","summary"].forEach(function(id){ var el=document.getElementById(id); if(el) el.style.display=""; });
    if (!globalEntries.length) return;
    var entries = getFilteredEntries();
    var resultSection = document.getElementById("resultSection");
    var resultContent = document.getElementById("resultContent");
    var ignoredInfo = document.getElementById("ignoredInfo");
    var groupMode = document.getElementById("groupBy").value;

    if (!entries.length) {
        resultSection.style.display = "block";
        resultContent.innerHTML = "<div class='summary-box'>Ingen data matcher de valgte filtre.</div>";
        ignoredInfo.textContent = buildIgnoredInfo();
        document.getElementById("btnPdf").style.display = "none";
        return;
    }

    var machinesMap = {};
    for (var i = 0; i < entries.length; i++) {
        if (!machinesMap[entries[i].maskine]) machinesMap[entries[i].maskine] = [];
        machinesMap[entries[i].maskine].push(entries[i]);
    }
    var machines = sortMachineList(Object.keys(machinesMap));
    var html = "";

    for (var m = 0; m < machines.length; m++) {
        var machine = machines[m];
        var machineEntries = machinesMap[machine];
        var totalMachine = 0;
        var yearTotals = {};
        for (var j = 0; j < machineEntries.length; j++) {
            totalMachine += machineEntries[j].tid;
            var yk = getYearKey(machineEntries[j].dato);
            if (!yearTotals[yk]) yearTotals[yk] = 0;
            yearTotals[yk] += machineEntries[j].tid;
        }

        html += "<div class='machine-section'>";
        html += "<h3>" + escapeHtml(machine) + "</h3>";
        html += "<div class='summary-box'>Samlet stop tid: <strong>" + formatMinutes(totalMachine) + " min</strong></div>";

        var yearKeys = Object.keys(yearTotals).sort();
        if (yearKeys.length) {
            html += "<div class='summary-box'><strong>Total pr. år:</strong><br>";
            for (var yi = 0; yi < yearKeys.length; yi++) {
                html += escapeHtml(yearKeys[yi]) + ": " + formatMinutes(yearTotals[yearKeys[yi]]) + " min";
                if (yi < yearKeys.length - 1) html += "<br>";
            }
            html += "</div>";
        }

        var blocks = buildPeriodBlocks(machineEntries, groupMode);
        for (var b = 0; b < blocks.length; b++) {
            html += buildTableHtml(blocks[b].rows, blocks[b].title);
        }

        var yearEntryMap = {};
        for (var ye = 0; ye < machineEntries.length; ye++) {
            var yearKey = getYearKey(machineEntries[ye].dato);
            if (!yearEntryMap[yearKey]) yearEntryMap[yearKey] = [];
            yearEntryMap[yearKey].push(machineEntries[ye]);
        }
        var machineYearKeys = Object.keys(yearEntryMap).sort();
        for (var y = 0; y < machineYearKeys.length; y++) {
            var currentYear = machineYearKeys[y];
            var yearRows = aggregateCodes(yearEntryMap[currentYear]).map(function(r) {
                return { code: r.kode, name: r.navn, minutes: r.tid };
            });
            html += buildYearSectionHtml(yearRows, "ÅRSTOTAL " + currentYear);
        }

        html += "</div>";
    }

    resultContent.innerHTML = html;
    ignoredInfo.textContent = buildIgnoredInfo();
    resultSection.style.display = "block";
    document.getElementById("btnPdf").style.display = "inline-block";
}

function buildIgnoredInfo() {
    if (!globalParsedMeta) return "";
    var txt = "Ignorerede linjer: " + globalParsedMeta.ignoredLines;
    if (globalParsedMeta.unknownMachineNames && globalParsedMeta.unknownMachineNames.length) {
        txt += " | Ukendte maskinnavne: " + globalParsedMeta.unknownMachineNames.join(", ");
    }
    return txt;
}

function beregn() {
  ["results","result","output","summary"].forEach(function(id){ var el=document.getElementById(id); if(el) el.style.display=""; });
    clearMessages();
    var raw = document.getElementById("dataInput").value.trim();
    if (!raw) {
        showError("Indsæt data før du beregner.");
        return;
    }

    var parsed = parseData(raw);
    if (!parsed.entries.length) {
        showError("Ingen gyldige linjer blev fundet. Tjek formatet: Dato[TAB]Maskine[TAB]Stopkode[TAB]Tid.");
        return;
    }

    globalEntries = parsed.entries;
    globalParsedMeta = parsed;
    populateFilters(globalEntries);
    renderResults();
    showSuccess("Data indlæst: " + parsed.entries.length + " gyldige linjer.");
}

function drawPdfFrame(doc, title, subtitle, metaLines) {
    var pageWidth = doc.internal.pageSize.getWidth();
    var pageHeight = doc.internal.pageSize.getHeight();

    doc.setFillColor(255,255,255);
    doc.rect(0, 0, pageWidth, pageHeight, "F");

    doc.setDrawColor(210, 0, 20);
    doc.setLineWidth(0.8);
    doc.line(12, 12, pageWidth - 12, 12);
    doc.setDrawColor(32, 134, 132);
    doc.setLineWidth(0.4);
    doc.line(12, 16, pageWidth - 12, 16);

    doc.setTextColor(210, 0, 20);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(18);
    doc.text(String(title || ""), 14, 26);

    if (subtitle) {
        doc.setTextColor(32, 134, 132);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(11);
        doc.text(String(subtitle), 14, 33);
    }

    var y = subtitle ? 41 : 36;
    if (Array.isArray(metaLines)) {
        doc.setTextColor(90, 90, 90);
        doc.setFontSize(9);
        for (var i = 0; i < metaLines.length; i++) {
            if (!metaLines[i]) continue;
            doc.text(String(metaLines[i]), 14, y, { maxWidth: pageWidth - 28 });
            y += 5;
        }
    }

    return y + 3;
}

function addPdfPageNumbers(doc) {
    var totalPages = doc.getNumberOfPages();
    var pageWidth = doc.internal.pageSize.getWidth();
    var pageHeight = doc.internal.pageSize.getHeight();
    for (var p = 1; p <= totalPages; p++) {
        doc.setPage(p);
        doc.setDrawColor(220, 220, 220);
        doc.setLineWidth(0.2);
        doc.line(12, pageHeight - 12, pageWidth - 12, pageHeight - 12);

        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);
        doc.setTextColor(100, 100, 100);
        doc.text("Stopkodeberegner v4.6", 14, pageHeight - 7);
        doc.text("Side " + p + " / " + totalPages, pageWidth - 14, pageHeight - 7, { align: "right" });
    }
}

function renderYearTotalPdfTable(doc, machine, year, yearRows){

    var totalMinutes = yearRows.reduce(function(sum, row) {

                    var wkObj = weekMap[weekKeys[k]];
                    if (startY > 245) {
                        doc.addPage();
                        doc.setFillColor(255,255,255);
                        doc.rect(0, 0, pageWidth, 297, "F");
                        startY = drawPdfFrame(doc, machine, getMonthLabel(monthKey) + " fortsat", []);
                    }
                    doc.setTextColor(240, 165, 0);
                    doc.setFont("helvetica", "bold");
                    doc.text(getWeekLabel(wkObj.info), 14, startY);
                    var wkRows = aggregateCodes(wkObj.entries).map(function(r) {
                        return [String(r.kode), r.navn, formatMinutesPdf(r.tid)];
                    });
                    doc.autoTable({
                        startY: startY + 3,
                        head: [["Stopkode", "Navn", "Stop tid (min)"]],
                        body: wkRows,
                        theme: "grid",
                        styles: { fontSize: 8, fillColor: [245,245,245], textColor: [20,20,20], lineColor: [32,134,132] },
                        headStyles: { fillColor: [240,240,240], textColor: [0,0,0] },
                        alternateRowStyles: { fillColor: [248,248,248] },
                        didParseCell: function(data) {
                            if (data.section === "body") {
                                if (data.row.index === 0) data.cell.styles.fillColor = [255, 235, 238];
                                if (data.row.index === 1) data.cell.styles.fillColor = [255,243,224];
                                if (data.row.index === 2) data.cell.styles.fillColor = [224,247,250];
                            }
                        }
                    });
                    startY = doc.lastAutoTable.finalY + 8;
                }
            }
        }

        var yearRowsMap = getYearRowsForMachine(machineEntries);
        var machineYearKeys = Object.keys(yearRowsMap).sort();
        for (var y = 0; y < machineYearKeys.length; y++) {
            renderYearTotalPdfTable(doc, machine, machineYearKeys[y], yearRowsMap[machineYearKeys[y]]);
        }
    }

    addPdfPageNumbers(doc);
    doc.save("stopkodeberegner_v4_6_rapport.pdf");
}
</script>
</body>
</html>
