<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Kode Beregner V2.3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #D20014;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .version {
            text-align: center;
            color: #555;
            font-size: 11px;
            margin-bottom: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        .input-section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }
        .input-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #208684;
            font-size: 16px;
        }
        .input-section p {
            margin-bottom: 12px;
            color: #999;
            font-size: 13px;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: #0f0f23;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #208684;
        }
        .buttons {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-calc {
            background: #D20014;
            color: white;
        }
        .btn-calc:hover {
            background: #9F000F;
        }
        .btn-clear {
            background: #333;
            color: #ccc;
        }
        .btn-clear:hover {
            background: #555;
        }
        .btn-pdf {
            background: #208684;
            color: white;
        }
        .btn-pdf:hover {
            background: #186462;
        }
        .group-select {
            margin-top: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }
        .group-select label {
            display: inline;
            margin-bottom: 0;
            font-size: 14px;
            color: #208684;
        }
        .group-select select {
            background: #0f0f23;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 8px 12px;
            font-size: 14px;
        }
        .group-select select:focus {
            outline: none;
            border-color: #208684;
        }
        .result-section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #0f3460;
            display: none;
        }
        .result-section h2 {
            color: #208684;
            margin-bottom: 15px;
            font-size: 20px;
        }
        .result-section h3 {
            color: #D20014;
            margin: 20px 0 10px 0;
            font-size: 17px;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th {
            background: #0f3460;
            color: #208684;
            padding: 12px 15px;
            text-align: left;
            font-size: 14px;
            border-bottom: 2px solid #208684;
        }
        td {
            padding: 10px 15px;
            border-bottom: 1px solid #1a1a3e;
            font-size: 14px;
        }
        tr:hover {
            background: #1a1a3e;
        }
        .total-row {
            background: #0f3460 !important;
            font-weight: bold;
            color: #D20014;
        }
        .total-row td {
            border-top: 2px solid #208684;
            font-size: 15px;
        }
        .code-val {
            color: #f0a500;
        }
        .time-val {
            color: #4fc3f7;
        }
        .total-val {
            color: #e0e0e0;
        }
        .ignored-info {
            margin-top: 15px;
            padding: 10px 15px;
            background: #1a1a2e;
            border-radius: 8px;
            color: #777;
            font-size: 12px;
            line-height: 1.5;
        }
        .error-msg {
            color: #D20014;
            background: #2a0a0a;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏱️ Stop Kode Beregner</h1>
        <p class="subtitle">Indsæt data fra Excel — beregn stop tid pr. maskine og stopkode</p>
        <p class="version">Version 2.3</p>

        <div class="input-section">
            <label>📋 Indsæt data fra Excel her:</label>
            <p>Forventet format: <strong>Dato (DD-MM-YYYY) [TAB] Maskine [TAB] Stopkode: Navn [TAB] Tid (min)</strong></p>
            <textarea id="dataInput" placeholder="Indsæt dine Excel-data her...

Eksempel:
17-03-2026	PSM01	8: Rengøring	30
17-03-2026	PSM01	11: Maskinstop	15
17-03-2026	PSM02	8: Rengøring	75"></textarea>

            <div class="group-select">
                <label>📅 Gruppér efter:</label>
                <select id="groupBy">
                    <option value="none">Ingen gruppering (samlet)</option>
                    <option value="uge">Uge</option>
                    <option value="maaned">Måned</option>
                </select>
            </div>

            <div class="buttons">
                <button class="btn btn-calc" onclick="beregn()">⚡ Beregn</button>
                <button class="btn btn-clear" onclick="ryd()">🗑️ Ryd</button>
                <button class="btn btn-pdf" id="btnPdf" onclick="downloadPdf()" style="display:none;">📄 Download PDF</button>
            </div>
            <div class="error-msg" id="errorMsg"></div>
        </div>

        <div class="result-section" id="resultSection">
            <h2>📊 Resultat — Stop Tider pr. Maskine & Stopkode</h2>
            <div id="resultContent"></div>
            <div class="ignored-info" id="ignoredInfo"></div>
        </div>
    </div>

    <script>
        var STOPKODER = {
            1: "Betjeningsfejl",
            2: "Granulering",
            3: "Klingeskift",
            4: "Maskinfejl",
            5: "Elfejl",
            6: "Uldmangel",
            7: "Udsugningsstop",
            8: "Rengøring",
            9: "Uld-kvalitet",
            10: "Folieskift",
            11: "Maskinstop",
            12: "Force majeure",
            13: "Hente uld",
            14: "Mangler AGV/Udkøre",
            15: "Mangler Hjælpe materialer",
            16: "Hjælp på anden maskine"
        };

        var MASKINE_ORDER = [
            "PSM01",
            "PSM02",
            "Teclict Sav3",
            "Lamelmåtten",
            "Krymperen",
            "RPI XII",
            "Sav 42",
            "Sav 44",
            "Sav 46",
            "Sav 48",
            "Rundsav (Sav35)",
            "Valse",
            "Båndsav 33",
            "Båndsav 34",
            "Båndsav Linje"
        ];

        var MAANEDER = [
            "Januar", "Februar", "Marts", "April", "Maj", "Juni",
            "Juli", "August", "September", "Oktober", "November", "December"
        ];

        var globalResults = null;

        function normalizeName(name) {
            return name.trim().toLowerCase().replace(/\s+/g, ' ');
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function findMaskineMatch(inputName) {
            var norm = normalizeName(inputName);

            for (var i = 0; i < MASKINE_ORDER.length; i++) {
                if (normalizeName(MASKINE_ORDER[i]) === norm) {
                    return MASKINE_ORDER[i];
                }
            }

            for (var j = 0; j < MASKINE_ORDER.length; j++) {
                var orderNorm = normalizeName(MASKINE_ORDER[j]);
                if (orderNorm.indexOf(norm) !== -1 || norm.indexOf(orderNorm) !== -1) {
                    return MASKINE_ORDER[j];
                }
            }

            return null;
        }

        function parseDato(str) {
            var parts = str.trim().split('-');
            if (parts.length !== 3) return null;

            var d = parseInt(parts[0], 10);
            var m = parseInt(parts[1], 10);
            var y = parseInt(parts[2], 10);

            if (isNaN(d) || isNaN(m) || isNaN(y)) return null;

            var date = new Date(y, m - 1, d);
            if (date.getFullYear() !== y || date.getMonth() !== m - 1 || date.getDate() !== d) {
                return null;
            }

            return date;
        }

        function getWeekNumber(date) {
            var d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            var dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return { year: d.getUTCFullYear(), week: weekNo };
        }

        function getGroupLabel(date, groupBy) {
            if (groupBy === 'uge') {
                var wk = getWeekNumber(date);
                return 'Uge ' + wk.week + ' (' + wk.year + ')';
            }

            if (groupBy === 'maaned') {
                return MAANEDER[date.getMonth()] + ' ' + date.getFullYear();
            }

            return 'Samlet';
        }

        function sortGroupLabels(labels, groupBy) {
            return labels.sort(function(a, b) {
                if (groupBy === 'none') return 0;

                if (groupBy === 'uge') {
                    var ma = a.match(/Uge\s+(\d+)\s+\((\d+)\)/);
                    var mb = b.match(/Uge\s+(\d+)\s+\((\d+)\)/);
                    if (!ma || !mb) return a.localeCompare(b, 'da');
                    var ay = parseInt(ma[2], 10), aw = parseInt(ma[1], 10);
                    var by = parseInt(mb[2], 10), bw = parseInt(mb[1], 10);
                    if (ay !== by) return ay - by;
                    return aw - bw;
                }

                if (groupBy === 'maaned') {
                    function monthIndex(label) {
                        for (var i = 0; i < MAANEDER.length; i++) {
                            if (label.indexOf(MAANEDER[i]) === 0) return i;
                        }
                        return -1;
                    }
                    var aYear = parseInt(a.split(' ').pop(), 10);
                    var bYear = parseInt(b.split(' ').pop(), 10);
                    if (aYear !== bYear) return aYear - bYear;
                    return monthIndex(a) - monthIndex(b);
                }

                return a.localeCompare(b, 'da');
            });
        }

        function compareMaskiner(a, b) {
            var ia = MASKINE_ORDER.indexOf(a);
            var ib = MASKINE_ORDER.indexOf(b);

            if (ia === -1 && ib === -1) return a.localeCompare(b, 'da');
            if (ia === -1) return 1;
            if (ib === -1) return -1;
            return ia - ib;
        }

        function formatNumber(n) {
            return Number(n).toLocaleString('da-DK', {
                minimumFractionDigits: 0,
                maximumFractionDigits: 2
            });
        }

        function buildTableHtml(groupData, groupName) {
            var machines = Object.keys(groupData).sort(compareMaskiner);
            var html = '<h3>' + escapeHtml(groupName) + '</h3>';
            html += '<table>';
            html += '<thead><tr><th>Maskine</th><th>Stopkode</th><th>Navn</th><th>Minutter</th></tr></thead><tbody>';

            var grandTotal = 0;

            for (var i = 0; i < machines.length; i++) {
                var maskine = machines[i];
                var codeMap = groupData[maskine];
                var codes = Object.keys(codeMap).map(Number).sort(function(a, b) { return a - b; });

                var machineTotal = 0;
                for (var c = 0; c < codes.length; c++) {
                    machineTotal += codeMap[codes[c]];
                }

                for (var j = 0; j < codes.length; j++) {
                    var kode = codes[j];
                    var navn = STOPKODER[kode] || 'Ukendt';
                    var minutter = codeMap[kode];

                    html += '<tr>';
                    html += '<td>' + escapeHtml(maskine) + '</td>';
                    html += '<td class="code-val">' + kode + '</td>';
                    html += '<td>' + escapeHtml(navn) + '</td>';
                    html += '<td class="time-val">' + formatNumber(minutter) + '</td>';
                    html += '</tr>';
                }

                html += '<tr class="total-row">';
                html += '<td>' + escapeHtml(maskine) + '</td>';
                html += '<td colspan="2">Total for maskine</td>';
                html += '<td class="total-val">' + formatNumber(machineTotal) + '</td>';
                html += '</tr>';

                grandTotal += machineTotal;
            }

            html += '<tr class="total-row">';
            html += '<td colspan="3">Grand Total</td>';
            html += '<td class="total-val">' + formatNumber(grandTotal) + '</td>';
            html += '</tr>';

            html += '</tbody></table>';
            return html;
        }

        function beregn() {
            var raw = document.getElementById('dataInput').value.trim();
            var errorEl = document.getElementById('errorMsg');
            var resultSection = document.getElementById('resultSection');
            var resultContent = document.getElementById('resultContent');
            var ignoredInfo = document.getElementById('ignoredInfo');
            var groupBy = document.getElementById('groupBy').value;
            var btnPdf = document.getElementById('btnPdf');

            errorEl.style.display = 'none';
            resultSection.style.display = 'none';
            btnPdf.style.display = 'none';
            resultContent.innerHTML = '';
            ignoredInfo.innerHTML = '';
            globalResults = null;

            if (!raw) {
                errorEl.textContent = '⚠️ Indsæt venligst data først!';
                errorEl.style.display = 'block';
                return;
            }

            var lines = raw.split(/\r?\n/);
            var entries = [];
            var ignoredLines = 0;
            var unknownMachineNames = {};

            for (var li = 0; li < lines.length; li++) {
                var line = lines[li].trim();
                if (!line) continue;

                var parts = line.split('\t');
                if (parts.length < 4) {
                    ignoredLines++;
                    continue;
                }

                var datoStr = parts[0].trim();
                var maskineStr = parts[1].trim();
                var kodeStr = parts[2].trim();
                var tidStr = parts[3].trim().replace(',', '.');

                var dato = parseDato(datoStr);
                var tid = parseFloat(tidStr);

                var kodeMatch = kodeStr.match(/^(\d+)/);
                var kode = kodeMatch ? parseInt(kodeMatch[1], 10) : null;

                if (!dato || !kode || kode < 1 || kode > 16 || isNaN(tid)) {
                    ignoredLines++;
                    continue;
                }

                var matchedMaskine = findMaskineMatch(maskineStr);
                if (!matchedMaskine) {
                    unknownMachineNames[maskineStr] = true;
                    matchedMaskine = maskineStr;
                }

                entries.push({
                    dato: dato,
                    maskine: matchedMaskine,
                    kode: kode,
                    tid: tid
                });
            }

            if (entries.length === 0) {
                errorEl.textContent = '⚠️ Ingen gyldige data fundet. Tjek at formatet er: Dato [TAB] Maskine [TAB] Stopkode [TAB] Tid';
                errorEl.style.display = 'block';
                return;
            }

            var grouped = {};

            for (var i = 0; i < entries.length; i++) {
                var entry = entries[i];
                var groupLabel = getGroupLabel(entry.dato, groupBy);

                if (!grouped[groupLabel]) grouped[groupLabel] = {};
                if (!grouped[groupLabel][entry.maskine]) grouped[groupLabel][entry.maskine] = {};
                if (!grouped[groupLabel][entry.maskine][entry.kode]) grouped[groupLabel][entry.maskine][entry.kode] = 0;

                grouped[groupLabel][entry.maskine][entry.kode] += entry.tid;
            }

            var groupLabels = sortGroupLabels(Object.keys(grouped), groupBy);
            var html = '';

            for (var g = 0; g < groupLabels.length; g++) {
                html += buildTableHtml(grouped[groupLabels[g]], groupLabels[g]);
            }

            resultContent.innerHTML = html;
            resultSection.style.display = 'block';
            btnPdf.style.display = 'inline-block';

            var info = [];
            info.push('Gyldige rækker behandlet: ' + entries.length);
            info.push('Ignorerede rækker: ' + ignoredLines);

            var unknownList = Object.keys(unknownMachineNames);
            if (unknownList.length > 0) {
                info.push('Ukendte maskinnavne beholdt som de stod: ' + unknownList.join(', '));
            }

            ignoredInfo.innerHTML = info.join('<br>');

            globalResults = {
                grouped: grouped,
                groupLabels: groupLabels,
                groupBy: groupBy,
                entries: entries
            };
        }

        function ryd() {
            document.getElementById('dataInput').value = '';
            document.getElementById('resultContent').innerHTML = '';
            document.getElementById('ignoredInfo').innerHTML = '';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('btnPdf').style.display = 'none';
            globalResults = null;
        }

        function downloadPdf() {
            if (!globalResults) {
                alert('Der er ingen resultater at eksportere endnu.');
                return;
            }

            var jsPDF = window.jspdf.jsPDF;
            var doc = new jsPDF('p', 'mm', 'a4');

            doc.setFontSize(16);
            doc.setTextColor(210, 0, 20);
            doc.text('Stop Kode Beregner - Rapport', 14, 15);

            doc.setFontSize(10);
            doc.setTextColor(100, 100, 100);
            doc.text('Genereret: ' + new Date().toLocaleString('da-DK'), 14, 22);

            var startY = 30;

            for (var g = 0; g < globalResults.groupLabels.length; g++) {
                var groupName = globalResults.groupLabels[g];
                var groupData = globalResults.grouped[groupName];
                var machines = Object.keys(groupData).sort(compareMaskiner);

                if (startY > 250) {
                    doc.addPage();
                    startY = 20;
                }

                doc.setFontSize(12);
                doc.setTextColor(32, 134, 132);
                doc.text(groupName, 14, startY);
                startY += 4;

                var body = [];
                var grandTotal = 0;

                for (var i = 0; i < machines.length; i++) {
                    var maskine = machines[i];
                    var codeMap = groupData[maskine];
                    var codes = Object.keys(codeMap).map(Number).sort(function(a, b) { return a - b; });

                    var machineTotal = 0;

                    for (var j = 0; j < codes.length; j++) {
                        var kode = codes[j];
                        var minutter = codeMap[kode];
                        machineTotal += minutter;

                        body.push([
                            maskine,
                            String(kode),
                            STOPKODER[kode] || 'Ukendt',
                            formatNumber(minutter)
                        ]);
                    }

                    body.push([
                        maskine,
                        '',
                        'Total for maskine',
                        formatNumber(machineTotal)
                    ]);

                    grandTotal += machineTotal;
                }

                body.push([
                    '',
                    '',
                    'Grand Total',
                    formatNumber(grandTotal)
                ]);

                doc.autoTable({
                    startY: startY,
                    head: [['Maskine', 'Stopkode', 'Navn', 'Minutter']],
                    body: body,
                    theme: 'grid',
                    styles: {
                        fontSize: 8,
                        cellPadding: 2
                    },
                    headStyles: {
                        fillColor: [15, 52, 96],
                        textColor: [32, 134, 132]
                    },
                    alternateRowStyles: {
                        fillColor: [245, 245, 245]
                    },
                    margin: { left: 14, right: 14 }
                });

                startY = doc.lastAutoTable.finalY + 10;
            }

            doc.save('stopkode_rapport.pdf');
        }
    </script>
</body>
</html>
