<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Kode Beregner V2.7</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #D20014;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .version {
            text-align: center;
            color: #555;
            font-size: 11px;
            margin-bottom: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .input-section, .result-section, .filter-section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }
        .input-section label, .filter-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #208684;
            font-size: 16px;
        }
        .input-section p {
            margin-bottom: 12px;
            color: #999;
            font-size: 13px;
        }
        textarea {
            width: 100%;
            height: 220px;
            background: #0f0f23;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
        }
        textarea:focus, select:focus, input:focus {
            outline: none;
            border-color: #208684;
        }
        .controls-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 15px;
            align-items: end;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            min-width: 220px;
            flex: 1;
        }
        .control-group select, .control-group input {
            background: #0f0f23;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 14px;
        }
        .buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-calc {
            background: #D20014;
            color: white;
        }
        .btn-calc:hover {
            background: #9F000F;
        }
        .btn-clear {
            background: #333;
            color: #ccc;
        }
        .btn-clear:hover {
            background: #555;
        }
        .btn-pdf {
            background: #208684;
            color: white;
        }
        .btn-pdf:hover {
            background: #186462;
        }
        .btn-small {
            padding: 8px 12px;
            font-size: 13px;
        }
        .result-section {
            display: none;
        }
        .result-section h2 {
            color: #208684;
            margin-bottom: 15px;
            font-size: 22px;
        }
        .result-section h3 {
            color: #D20014;
            margin: 25px 0 10px 0;
            font-size: 18px;
            border-bottom: 1px solid #0f3460;
            padding-bottom: 6px;
        }
        .result-section h4 {
            color: #f0a500;
            margin: 20px 0 8px 0;
            font-size: 15px;
        }
        .machine-section {
            margin-bottom: 35px;
            padding: 15px;
            border: 1px solid #243b63;
            border-radius: 10px;
            background: #111a33;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 18px;
        }
        th {
            background: #0f3460;
            color: #208684;
            padding: 12px 15px;
            text-align: left;
            font-size: 14px;
            border-bottom: 2px solid #208684;
        }
        td {
            padding: 10px 15px;
            border-bottom: 1px solid #1a1a3e;
            font-size: 14px;
        }
        tr:hover {
            background: #1a1a3e;
        }
        .total-row {
            background: #0f3460 !important;
            font-weight: bold;
            color: #D20014;
        }
        .total-row td {
            border-top: 2px solid #208684;
            font-size: 15px;
        }
        .summary-box {
            background: #10182d;
            border: 1px solid #20385f;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 15px;
            color: #ccc;
        }
        .ignored-info {
            margin-top: 15px;
            padding: 10px 15px;
            background: #1a1a2e;
            border-radius: 8px;
            color: #777;
            font-size: 12px;
        }
        .error-msg {
            color: #ff9fa8;
            background: #2a0a0a;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }
        .success-msg {
            color: #9ff3d1;
            background: #0f2a22;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }
        .checkbox-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 8px;
            margin-top: 10px;
            background: #0f0f23;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            max-height: 220px;
            overflow-y: auto;
        }
        .checkbox-list label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #ddd;
            font-size: 14px;
            margin: 0;
            font-weight: normal;
        }
        .top-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }
        .muted {
            color: #888;
            font-size: 12px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>⏱️ Stop Kode Beregner</h1>
    <p class="subtitle">Analyse af stop tid pr. maskine, uge og måned</p>
    <p class="version">Version 2.7</p>

    <div class="input-section">
        <label for="dataInput">📋 Indsæt data fra Excel her:</label>
        <p>Forventet format: <strong>Dato [TAB] Maskine [TAB] Stopkode: Navn [TAB] Tid i minutter</strong></p>
        <textarea id="dataInput" placeholder="Eksempel:
17-03-2026	PSM01	8: Rengøring	30
17-03-2026	PSM01	11: Maskinstop	15
17-03-2026	PSM02	5: Elfejl	42"></textarea>

        <div class="controls-row">
            <div class="control-group">
                <label for="groupBy">📅 Gruppering</label>
                <select id="groupBy">
                    <option value="uge_maaned">Uge/Måned</option>
                    <option value="maaned">Kun måned</option>
                    <option value="uge">Kun uge</option>
                </select>
            </div>

            <div class="control-group">
                <label for="filterMachine">🏭 Vælg maskine</label>
                <select id="filterMachine">
                    <option value="">Alle maskiner</option>
                </select>
            </div>

            <div class="control-group">
                <label for="filterMonth">🗓️ Vælg måned</label>
                <select id="filterMonth">
                    <option value="">Alle måneder</option>
                </select>
            </div>
        </div>

        <div class="buttons">
            <button class="btn btn-calc" onclick="beregn()">⚡ Beregn</button>
            <button class="btn btn-clear" onclick="ryd()">🗑️ Ryd</button>
            <button class="btn btn-pdf" id="btnPdf" onclick="downloadPdf()" style="display:none;">📄 Download PDF</button>
        </div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>
    </div>

    <div class="filter-section" id="pdfFilterSection" style="display:none;">
        <label>📑 Vælg hvilke maskiner der skal med i PDF</label>
        <div class="top-actions">
            <button class="btn btn-small btn-clear" type="button" onclick="markAllPdfMachines(true)">Vælg alle</button>
            <button class="btn btn-small btn-clear" type="button" onclick="markAllPdfMachines(false)">Fjern alle</button>
        </div>
        <div class="checkbox-list" id="pdfMachineList"></div>
        <div class="muted">Kun valgte maskiner eksporteres til PDF.</div>
    </div>

    <div class="result-section" id="resultSection">
        <h2>📊 Resultat</h2>
        <div id="resultContent"></div>
        <div class="ignored-info" id="ignoredInfo"></div>
    </div>
</div>

<script>
var STOPKODER = {
    1: "Betjeningsfejl",
    2: "Granulering",
    3: "Klingeskift",
    4: "Maskinfejl",
    5: "Elfejl",
    6: "Uldmangel",
    7: "Udsugningsstop",
    8: "Rengøring",
    9: "Uld-kvalitet",
    10: "Folieskift",
    11: "Maskinstop",
    12: "Force majeure",
    13: "Hente uld",
    14: "Mangler AGV/Udkøre",
    15: "Mangler Hjælpe materialer",
    16: "Hjælp på anden maskine"
};

var MASKINE_ORDER = [
    "PSM01", "PSM02", "Teclict Sav3", "Lamelmåtten", "Krymperen",
    "RPI XII", "Sav 42", "Sav 44", "Sav 46", "Sav 48",
    "Rundsav (Sav35)", "Valse", "Båndsav 33", "Båndsav 34", "Båndsav Linje"
];

var MAANEDER = ["Januar", "Februar", "Marts", "April", "Maj", "Juni", "Juli", "August", "September", "Oktober", "November", "December"];

var globalResults = null;
var globalEntries = [];

function normalizeName(name) {
    return name.trim().toLowerCase().replace(/\s+/g, ' ');
}

function findMaskineMatch(inputName) {
    var norm = normalizeName(inputName);
    for (var i = 0; i < MASKINE_ORDER.length; i++) {
        if (normalizeName(MASKINE_ORDER[i]) === norm) return MASKINE_ORDER[i];
    }
    for (var j = 0; j < MASKINE_ORDER.length; j++) {
        var orderNorm = normalizeName(MASKINE_ORDER[j]);
        if (orderNorm.indexOf(norm) !== -1 || norm.indexOf(orderNorm) !== -1) return MASKINE_ORDER[j];
    }
    return inputName.trim();
}

function parseDato(str) {
    var parts = str.trim().split('-');
    if (parts.length !== 3) return null;
    var d = parseInt(parts[0], 10);
    var m = parseInt(parts[1], 10);
    var y = parseInt(parts[2], 10);
    if (isNaN(d) || isNaN(m) || isNaN(y)) return null;
    var dt = new Date(y, m - 1, d);
    if (isNaN(dt.getTime())) return null;
    return dt;
}

function getWeekNumber(date) {
    var d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
    var dayNum = d.getUTCDay() || 7;
    d.setUTCDate(d.getUTCDate() + 4 - dayNum);
    var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
    var weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
    return { year: d.getUTCFullYear(), week: weekNo };
}

function getMonthKey(date) {
    return date.getFullYear() + "-" + String(date.getMonth() + 1).padStart(2, "0");
}

function getMonthLabel(monthKey) {
    var parts = monthKey.split("-");
    var year = parts[0];
    var monthIndex = parseInt(parts[1], 10) - 1;
    return MAANEDER[monthIndex] + " " + year;
}

function formatMinutes(val) {
    return Number(val || 0).toFixed(1).replace(".0", "");
}

function escapeHtml(text) {
    return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
}

function buildSummary(entries) {
    var total = 0;
    for (var i = 0; i < entries.length; i++) total += entries[i].tid;
    return total;
}

function aggregateCodes(entries) {
    var map = {};
    for (var i = 0; i < entries.length; i++) {
        var kode = entries[i].kode;
        if (!map[kode]) map[kode] = 0;
        map[kode] += entries[i].tid;
    }

    var arr = [];
    for (var k = 1; k <= 16; k++) {
        if (map[k]) {
            arr.push({
                kode: k,
                navn: STOPKODER[k] || ("Kode " + k),
                tid: map[k]
            });
        }
    }

    arr.sort(function(a, b) { return b.tid - a.tid; });
    return arr;
}

function buildTableHtml(rows, title) {
    var html = "<h4>" + escapeHtml(title) + "</h4>";
    html += "<table>";
    html += "<thead><tr><th>Stopkode</th><th>Navn</th><th>Stop tid (min)</th></tr></thead><tbody>";

    var total = 0;
    for (var i = 0; i < rows.length; i++) {
        total += rows[i].tid;
        html += "<tr>";
        html += "<td>" + rows[i].kode + "</td>";
        html += "<td>" + escapeHtml(rows[i].navn) + "</td>";
        html += "<td>" + formatMinutes(rows[i].tid) + "</td>";
        html += "</tr>";
    }

    html += "<tr class='total-row'><td colspan='2'>Total</td><td>" + formatMinutes(total) + "</td></tr>";
    html += "</tbody></table>";
    return html;
}

function populateFilters(entries) {
    var machineSelect = document.getElementById("filterMachine");
    var monthSelect = document.getElementById("filterMonth");

    var machines = {};
    var months = {};

    for (var i = 0; i < entries.length; i++) {
        machines[entries[i].maskine] = true;
        months[getMonthKey(entries[i].dato)] = true;
    }

    var machineList = Object.keys(machines).sort(function(a, b) {
        var ia = MASKINE_ORDER.indexOf(a);
        var ib = MASKINE_ORDER.indexOf(b);
        if (ia === -1 && ib === -1) return a.localeCompare(b, 'da');
        if (ia === -1) return 1;
        if (ib === -1) return -1;
        return ia - ib;
    });

    var monthList = Object.keys(months).sort();

    machineSelect.innerHTML = '<option value="">Alle maskiner</option>';
    for (var m = 0; m < machineList.length; m++) {
        machineSelect.innerHTML += '<option value="' + escapeHtml(machineList[m]) + '">' + escapeHtml(machineList[m]) + '</option>';
    }

    monthSelect.innerHTML = '<option value="">Alle måneder</option>';
    for (var mo = 0; mo < monthList.length; mo++) {
        monthSelect.innerHTML += '<option value="' + monthList[mo] + '">' + getMonthLabel(monthList[mo]) + '</option>';
    }

    buildPdfMachineList(machineList);
}

function buildPdfMachineList(machineList) {
    var container = document.getElementById("pdfMachineList");
    var section = document.getElementById("pdfFilterSection");
    container.innerHTML = "";

    if (!machineList.length) {
        section.style.display = "none";
        return;
    }

    for (var i = 0; i < machineList.length; i++) {
        var machine = machineList[i];
        container.innerHTML += '' +
            '<label>' +
            '<input type="checkbox" class="pdf-machine-check" value="' + escapeHtml(machine) + '" checked> ' +
            escapeHtml(machine) +
            '</label>';
    }

    section.style.display = "block";
}

function markAllPdfMachines(state) {
    var checks = document.querySelectorAll(".pdf-machine-check");
    for (var i = 0; i < checks.length; i++) {
        checks[i].checked = state;
    }
}

function parseData(raw) {
    var lines = raw.split(/\r?\n/);
    var entries = [];
    var ignoredLines = 0;
    var unknownMachineNames = {};

    for (var li = 0; li < lines.length; li++) {
        var line = lines[li].trim();
        if (!line) continue;

        var parts = line.split('\t');
        if (parts.length < 4) {
            ignoredLines++;
            continue;
        }

        var datoStr = parts[0].trim();
        var maskineStr = parts[1].trim();
        var kodeStr = parts[2].trim();
        var tidStr = parts[3].trim().replace(",", ".");

        var dato = parseDato(datoStr);
        var tid = parseFloat(tidStr);
        var kodeMatch = kodeStr.match(/^(\d+)/);
        var kode = kodeMatch ? parseInt(kodeMatch[1], 10) : null;

        if (!dato || isNaN(tid) || kode === null || kode < 1 || kode > 16) {
            ignoredLines++;
            continue;
        }

        var matchedMaskine = findMaskineMatch(maskineStr);
        if (MASKINE_ORDER.indexOf(matchedMaskine) === -1 && normalizeName(matchedMaskine) === normalizeName(maskineStr)) {
            unknownMachineNames[maskineStr] = true;
        }

        entries.push({
            dato: dato,
            maskine: matchedMaskine,
            kode: kode,
            tid: tid
        });
    }

    return {
        entries: entries,
        ignoredLines: ignoredLines,
        unknownMachineNames: Object.keys(unknownMachineNames)
    };
}

function applyFilters(entries) {
    var machine = document.getElementById("filterMachine").value;
    var month = document.getElementById("filterMonth").value;

    return entries.filter(function(entry) {
        var okMachine = !machine || entry.maskine === machine;
        var okMonth = !month || getMonthKey(entry.dato) === month;
        return okMachine && okMonth;
    });
}

function sortMachines(machineNames) {
    return machineNames.sort(function(a, b) {
        var ia = MASKINE_ORDER.indexOf(a);
        var ib = MASKINE_ORDER.indexOf(b);
        if (ia === -1 && ib === -1) return a.localeCompare(b, 'da');
        if (ia === -1) return 1;
        if (ib === -1) return -1;
        return ia - ib;
    });
}

function generateMachineSection(machineName, machineEntries, grouping) {
    var html = "<div class='machine-section'>";
    html += "<h3>🏭 " + escapeHtml(machineName) + "</h3>";

    var machineTotal = buildSummary(machineEntries);
    html += "<div class='summary-box'><strong>Total stop tid:</strong> " + formatMinutes(machineTotal) + " min</div>";

    if (grouping === "maaned" || grouping === "uge_maaned") {
        var monthMap = {};
        for (var i = 0; i < machineEntries.length; i++) {
            var monthKey = getMonthKey(machineEntries[i].dato);
            if (!monthMap[monthKey]) monthMap[monthKey] = [];
            monthMap[monthKey].push(machineEntries[i]);
        }

        var monthKeys = Object.keys(monthMap).sort();
        for (var m = 0; m < monthKeys.length; m++) {
            var monthKey = monthKeys[m];
            var rows = aggregateCodes(monthMap[monthKey]);
            html += buildTableHtml(rows, "Måned: " + getMonthLabel(monthKey));
        }
    }

    if (grouping === "uge" || grouping === "uge_maaned") {
        var weekMap = {};
        for (var j = 0; j < machineEntries.length; j++) {
            var w = getWeekNumber(machineEntries[j].dato);
            var weekKey = w.year + "-U" + String(w.week).padStart(2, "0");
            if (!weekMap[weekKey]) weekMap[weekKey] = [];
            weekMap[weekKey].push(machineEntries[j]);
        }

        var weekKeys = Object.keys(weekMap).sort();
        for (var wk = 0; wk < weekKeys.length; wk++) {
            var weekKey = weekKeys[wk];
            var weekRows = aggregateCodes(weekMap[weekKey]);
            html += buildTableHtml(weekRows, "Uge: " + weekKey);
        }
    }

    html += "</div>";
    return html;
}

function beregn() {
    var raw = document.getElementById("dataInput").value.trim();
    var errorEl = document.getElementById("errorMsg");
    var successEl = document.getElementById("successMsg");
    var resultSection = document.getElementById("resultSection");
    var resultContent = document.getElementById("resultContent");
    var ignoredInfo = document.getElementById("ignoredInfo");
    var btnPdf = document.getElementById("btnPdf");
    var grouping = document.getElementById("groupBy").value;

    errorEl.style.display = "none";
    successEl.style.display = "none";
    resultSection.style.display = "none";
    btnPdf.style.display = "none";
    resultContent.innerHTML = "";
    ignoredInfo.innerHTML = "";

    if (!raw) {
        errorEl.textContent = "⚠️ Indsæt venligst data først!";
        errorEl.style.display = "block";
        return;
    }

    var parsed = parseData(raw);
    globalEntries = parsed.entries;

    if (!globalEntries.length) {
        errorEl.textContent = "⚠️ Ingen gyldige linjer blev fundet. Tjek formatet fra Excel.";
        errorEl.style.display = "block";
        return;
    }

    populateFilters(globalEntries);

    var filteredEntries = applyFilters(globalEntries);
    if (!filteredEntries.length) {
        errorEl.textContent = "⚠️ Ingen data matcher de valgte filtre.";
        errorEl.style.display = "block";
        return;
    }

    var machineMap = {};
    for (var i = 0; i < filteredEntries.length; i++) {
        if (!machineMap[filteredEntries[i].maskine]) machineMap[filteredEntries[i].maskine] = [];
        machineMap[filteredEntries[i].maskine].push(filteredEntries[i]);
    }

    var machineNames = sortMachines(Object.keys(machineMap));
    var html = "";

    for (var m = 0; m < machineNames.length; m++) {
        html += generateMachineSection(machineNames[m], machineMap[machineNames[m]], grouping);
    }

    resultContent.innerHTML = html;
    resultSection.style.display = "block";
    btnPdf.style.display = "inline-block";

    var infoText = "Gyldige linjer: " + globalEntries.length + " | Ignorerede linjer: " + parsed.ignoredLines;
    if (parsed.unknownMachineNames.length) {
        infoText += " | Ukendte maskinnavne fundet: " + parsed.unknownMachineNames.join(", ");
    }
    ignoredInfo.textContent = infoText;

    globalResults = {
        grouping: grouping,
        filteredEntries: filteredEntries,
        machineMap: machineMap,
        machineNames: machineNames
    };

    successEl.textContent = "✅ Beregning gennemført.";
    successEl.style.display = "block";
}

function ryd() {
    document.getElementById("dataInput").value = "";
    document.getElementById("filterMachine").innerHTML = '<option value="">Alle maskiner</option>';
    document.getElementById("filterMonth").innerHTML = '<option value="">Alle måneder</option>';
    document.getElementById("resultContent").innerHTML = "";
    document.getElementById("ignoredInfo").innerHTML = "";
    document.getElementById("resultSection").style.display = "none";
    document.getElementById("btnPdf").style.display = "none";
    document.getElementById("errorMsg").style.display = "none";
    document.getElementById("successMsg").style.display = "none";
    document.getElementById("pdfMachineList").innerHTML = "";
    document.getElementById("pdfFilterSection").style.display = "none";
    globalResults = null;
    globalEntries = [];
}

function getSelectedPdfMachines() {
    var checks = document.querySelectorAll(".pdf-machine-check:checked");
    var selected = [];
    for (var i = 0; i < checks.length; i++) {
        selected.push(checks[i].value);
    }
    return selected;
}

function downloadPdf() {
    var errorEl = document.getElementById("errorMsg");
    errorEl.style.display = "none";

    if (!globalResults || !globalResults.machineNames.length) {
        errorEl.textContent = "⚠️ Du skal beregne data før du kan lave PDF.";
        errorEl.style.display = "block";
        return;
    }

    var selectedMachines = getSelectedPdfMachines();
    if (!selectedMachines.length) {
        errorEl.textContent = "⚠️ Vælg mindst én maskine til PDF eksport.";
        errorEl.style.display = "block";
        return;
    }

    var jsPDF = window.jspdf.jsPDF;
    var doc = new jsPDF("p", "mm", "a4");
    var pageWidth = doc.internal.pageSize.getWidth();
    var pageHeight = doc.internal.pageSize.getHeight();

    doc.setFillColor(210, 0, 20);
    doc.rect(0, 0, pageWidth, 35, "F");

    doc.setTextColor(255, 255, 255);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(22);
    doc.text("Stop Kode Rapport", 15, 18);

    doc.setFontSize(11);
    doc.setFont("helvetica", "normal");
    doc.text("Version 2.7", 15, 27);

    doc.setTextColor(60, 60, 60);
    doc.setFontSize(14);
    doc.setFont("helvetica", "bold");
    doc.text("Rapportoversigt", 15, 50);

    doc.setFont("helvetica", "normal");
    doc.setFontSize(11);
    doc.text("Dato: " + new Date().toLocaleDateString("da-DK"), 15, 60);
    doc.text("Gruppering: " + document.getElementById("groupBy").selectedOptions[0].text, 15, 67);
    doc.text("Valgte maskiner: " + selectedMachines.length, 15, 74);

    var selectedFilterMachine = document.getElementById("filterMachine").value || "Alle";
    var selectedFilterMonth = document.getElementById("filterMonth").value ? getMonthLabel(document.getElementById("filterMonth").value) : "Alle";
    doc.text("Filter maskine: " + selectedFilterMachine, 15, 81);
    doc.text("Filter måned: " + selectedFilterMonth, 15, 88);

    doc.setDrawColor(32, 134, 132);
    doc.setLineWidth(0.6);
    doc.line(15, 95, 195, 95);

    var grouped = globalResults.grouping;

    for (var i = 0; i < selectedMachines.length; i++) {
        var machine = selectedMachines[i];
        var machineEntries = globalResults.machineMap[machine];
        if (!machineEntries || !machineEntries.length) continue;

        doc.addPage();

        doc.setFillColor(22, 33, 62);
        doc.rect(0, 0, pageWidth, 20, "F");
        doc.setTextColor(255, 255, 255);
        doc.setFont("helvetica", "bold");
        doc.setFontSize(18);
        doc.text(machine, 15, 13);

        doc.setTextColor(60, 60, 60);
        doc.setFontSize(11);
        doc.setFont("helvetica", "normal");
        doc.text("Samlet stop tid: " + formatMinutes(buildSummary(machineEntries)) + " min", 15, 30);

        var startY = 38;

        if (grouped === "maaned" || grouped === "uge_maaned") {
            var monthMap = {};
            for (var m = 0; m < machineEntries.length; m++) {
                var monthKey = getMonthKey(machineEntries[m].dato);
                if (!monthMap[monthKey]) monthMap[monthKey] = [];
                monthMap[monthKey].push(machineEntries[m]);
            }

            var monthKeys = Object.keys(monthMap).sort();
            for (var mk = 0; mk < monthKeys.length; mk++) {
                var monthKey = monthKeys[mk];
                var monthRows = aggregateCodes(monthMap[monthKey]).map(function(r) {
                    return [r.kode, r.navn, formatMinutes(r.tid)];
                });

                var monthTotal = buildSummary(monthMap[monthKey]);
                monthRows.push([{content: "Total", colSpan: 2, styles: {fontStyle: "bold"}}, {content: formatMinutes(monthTotal), styles: {fontStyle: "bold"}}]);

                doc.setFont("helvetica", "bold");
                doc.setFontSize(12);
                doc.text("Måned: " + getMonthLabel(monthKey), 15, startY);

                doc.autoTable({
                    startY: startY + 3,
                    head: [["Stopkode", "Navn", "Stop tid (min)"]],
                    body: monthRows,
                    theme: "grid",
                    margin: { left: 15, right: 15 },
                    styles: { fontSize: 9, cellPadding: 2.5 },
                    headStyles: { fillColor: [15, 52, 96], textColor: [255, 255, 255] },
                    alternateRowStyles: { fillColor: [245, 245, 245] }
                });

                startY = doc.lastAutoTable.finalY + 10;
                if (startY > 240 && mk < monthKeys.length - 1) {
                    doc.addPage();
                    startY = 20;
                }
            }
        }

        if (grouped === "uge" || grouped === "uge_maaned") {
            if (startY > 220) {
                doc.addPage();
                startY = 20;
            }

            var weekMap = {};
            for (var w = 0; w < machineEntries.length; w++) {
                var weekObj = getWeekNumber(machineEntries[w].dato);
                var weekKey = weekObj.year + "-U" + String(weekObj.week).padStart(2, "0");
                if (!weekMap[weekKey]) weekMap[weekKey] = [];
                weekMap[weekKey].push(machineEntries[w]);
            }

            var weekKeys = Object.keys(weekMap).sort();
            for (var wk = 0; wk < weekKeys.length; wk++) {
                var weekKey = weekKeys[wk];
                var weekRows = aggregateCodes(weekMap[weekKey]).map(function(r) {
                    return [r.kode, r.navn, formatMinutes(r.tid)];
                });

                var weekTotal = buildSummary(weekMap[weekKey]);
                weekRows.push([{content: "Total", colSpan: 2, styles: {fontStyle: "bold"}}, {content: formatMinutes(weekTotal), styles: {fontStyle: "bold"}}]);

                doc.setFont("helvetica", "bold");
                doc.setFontSize(12);
                doc.text("Uge: " + weekKey, 15, startY);

                doc.autoTable({
                    startY: startY + 3,
                    head: [["Stopkode", "Navn", "Stop tid (min)"]],
                    body: weekRows,
                    theme: "grid",
                    margin: { left: 15, right: 15 },
                    styles: { fontSize: 9, cellPadding: 2.5 },
                    headStyles: { fillColor: [32, 134, 132], textColor: [255, 255, 255] },
                    alternateRowStyles: { fillColor: [245, 245, 245] }
                });

                startY = doc.lastAutoTable.finalY + 10;
                if (startY > 240 && wk < weekKeys.length - 1) {
                    doc.addPage();
                    startY = 20;
                }
            }
        }
    }

    doc.save("stop_kode_rapport_v2_7.pdf");
}
</script>
</body>
</html>
