<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stop Kode Beregner V2.2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #D20014;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .version {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 12px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        .input-section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #0f3460;
        }
        .input-section label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #208684;
            font-size: 16px;
        }
        .input-section p {
            margin-bottom: 12px;
            color: #999;
            font-size: 13px;
        }
        textarea {
            width: 100%;
            height: 220px;
            background: #0f0f23;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #208684;
        }
        .buttons {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-calc {
            background: #D20014;
            color: white;
        }
        .btn-calc:hover {
            background: #9F000F;
        }
        .btn-clear {
            background: #333;
            color: #ccc;
        }
        .btn-clear:hover {
            background: #555;
        }
        .btn-pdf {
            background: #208684;
            color: white;
        }
        .btn-pdf:hover {
            background: #186c6a;
        }
        .filters {
            margin-top: 15px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filters label {
            margin-bottom: 0;
            font-size: 14px;
        }
        .filters select {
            background: #0f0f23;
            color: #e0e0e0;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 8px 12px;
        }
        .result-section {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid #0f3460;
            display: none;
        }
        .result-section h2 {
            color: #208684;
            margin-bottom: 15px;
            font-size: 20px;
        }
        .result-section h3 {
            color: #D20014;
            margin: 25px 0 10px 0;
            font-size: 18px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th {
            background: #0f3460;
            color: #208684;
            padding: 12px 15px;
            text-align: left;
            font-size: 14px;
            border-bottom: 2px solid #208684;
        }
        td {
            padding: 10px 15px;
            border-bottom: 1px solid #1a1a3e;
            font-size: 14px;
        }
        tr:hover {
            background: #1a1a3e;
        }
        .total-row {
            background: #0f3460 !important;
            font-weight: bold;
            color: #D20014;
        }
        .total-row td {
            border-top: 2px solid #208684;
            font-size: 15px;
        }
        .ignored-info {
            margin-top: 15px;
            padding: 10px 15px;
            background: #1a1a2e;
            border-radius: 8px;
            color: #777;
            font-size: 12px;
        }
        .error-msg {
            color: #D20014;
            background: #2a0a0a;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }
        .period-title {
            color: #f0a500;
            margin: 20px 0 10px 0;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⏱️ Stop Kode Beregner</h1>
        <p class="subtitle">Indsæt data fra Excel — beregn stop tid pr. maskine og stopkode</p>
        <p class="version">Version 2.2</p>

        <div class="input-section">
            <label>📋 Indsæt data fra Excel her:</label>
            <p>Forventet format: <strong>Dato [TAB] Maskine [TAB] Stopkode [TAB] Tid</strong><br>Eksempel: <strong>18/03/2026	Krymperen	4	50</strong></p>

            <textarea id="dataInput" placeholder="Indsæt dine Excel-data her...

18/03/2026	Krymperen	4	50
18/03/2026	PSM01	5	30
19/03/2026	Krymperen	1	20
19/03/2026	Sav 42	3	15"></textarea>

            <div class="filters">
                <label for="groupBy">📅 Gruppér efter:</label>
                <select id="groupBy">
                    <option value="samlet">Samlet</option>
                    <option value="uge">Uge</option>
                    <option value="maaned">Måned</option>
                </select>
            </div>

            <div class="buttons">
                <button class="btn btn-calc" onclick="beregn()">⚡ Beregn</button>
                <button class="btn btn-clear" onclick="ryd()">🗑️ Ryd</button>
                <button class="btn btn-pdf" onclick="downloadPDF()" id="pdfBtn" style="display:none;">📄 Download PDF</button>
            </div>

            <div class="error-msg" id="errorMsg"></div>
        </div>

        <div class="result-section" id="resultSection">
            <h2>📊 Resultat — Stop Tider pr. Maskine & Stopkode</h2>
            <div id="resultContent"></div>
            <div class="ignored-info" id="ignoredInfo"></div>
        </div>
    </div>

    <script>
        const STOPKODER = {
            1: "Betjeningsfejl",
            2: "Granulering",
            3: "Klingeskift",
            4: "Maskinfejl",
            5: "El fejl",
            6: "Uldmangel",
            7: "Udsuningsstop",
            8: "Rengøring",
            9: "Uld kvalitet",
            10: "Folie skift",
            11: "Maskinstop",
            12: "Force majeure",
            13: "Hente uld",
            14: "Mangler AGV/Udkøre",
            15: "Mangler Hjælpe martialer",
            16: "Hjælp på anden Maskine"
        };

        const MASKINE_ORDER = [
            "PSM01",
            "PSM02",
            "Teclict sav01",
            "Lamel",
            "Krymperen",
            "RPI XII",
            "Sav 42",
            "Sav 44",
            "Sav 46",
            "Sav 48",
            "Rundsav (Sav35)",
            "Valse",
            "Båndsav 33",
            "Båndsav 34",
            "Båndsav Linje"
        ];

        let sidsteBeregning = null;

        function normalizeName(name) {
            return name.trim().toLowerCase().replace(/\s+/g, ' ');
        }

        function findMaskineMatch(inputName) {
            const norm = normalizeName(inputName);

            for (let i = 0; i < MASKINE_ORDER.length; i++) {
                if (normalizeName(MASKINE_ORDER[i]) === norm) {
                    return MASKINE_ORDER[i];
                }
            }

            for (let i = 0; i < MASKINE_ORDER.length; i++) {
                const orderNorm = normalizeName(MASKINE_ORDER[i]);
                if (orderNorm.includes(norm) || norm.includes(orderNorm)) {
                    return MASKINE_ORDER[i];
                }
            }

            return inputName.trim();
        }

        function parseDato(str) {
            const parts = str.trim().split('/');
            if (parts.length !== 3) return null;

            const day = parseInt(parts[0], 10);
            const month = parseInt(parts[1], 10);
            const year = parseInt(parts[2], 10);

            if (isNaN(day) || isNaN(month) || isNaN(year)) return null;

            const d = new Date(year, month - 1, day);
            if (d.getFullYear() !== year || d.getMonth() !== month - 1 || d.getDate() !== day) {
                return null;
            }
            return d;
        }

        function getWeekNumber(date) {
            const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            const dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
            return { week: weekNo, year: d.getUTCFullYear() };
        }

        function getMonthKey(date) {
            const monthNames = [
                "Januar", "Februar", "Marts", "April", "Maj", "Juni",
                "Juli", "August", "September", "Oktober", "November", "December"
            ];
            return monthNames[date.getMonth()] + " " + date.getFullYear();
        }

        function getGroupKey(date, mode) {
            if (mode === "uge") {
                const week = getWeekNumber(date);
                return "Uge " + week.week + " - " + week.year;
            }
            if (mode === "maaned") {
                return getMonthKey(date);
            }
            return "Samlet";
        }

        function createEmptyCodes() {
            const obj = {};
            for (let i = 1; i <= 16; i++) {
                obj[i] = 0;
            }
            return obj;
        }

        function beregn() {
            const raw = document.getElementById('dataInput').value.trim();
            const errorEl = document.getElementById('errorMsg');
            const resultSection = document.getElementById('resultSection');
            const resultContent = document.getElementById('resultContent');
            const ignoredInfo = document.getElementById('ignoredInfo');
            const pdfBtn = document.getElementById('pdfBtn');
            const groupBy = document.getElementById('groupBy').value;

            errorEl.style.display = 'none';
            resultSection.style.display = 'none';
            pdfBtn.style.display = 'none';
            resultContent.innerHTML = '';
            ignoredInfo.textContent = '';
            sidsteBeregning = null;

            if (!raw) {
                errorEl.textContent = '⚠️ Indsæt venligst data først!';
                errorEl.style.display = 'block';
                return;
            }

            const lines = raw.split('\n');
            const grupper = {};
            let ignoredLines = 0;
            let parsedLines = 0;

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                const parts = line.split('\t');
                if (parts.length < 4) {
                    ignoredLines++;
                    continue;
                }

                const dato = parseDato(parts[0]);
                const maskine = findMaskineMatch(parts[1]);
                const stopkode = parseInt(parts[2], 10);
                const tid = parseFloat(String(parts[3]).replace(',', '.'));

                if (!dato || !maskine || isNaN(stopkode) || stopkode < 1 || stopkode > 16 || isNaN(tid)) {
                    ignoredLines++;
                    continue;
                }

                const gruppeKey = getGroupKey(dato, groupBy);

                if (!grupper[gruppeKey]) {
                    grupper[gruppeKey] = {};
                }

                if (!grupper[gruppeKey][maskine]) {
                    grupper[gruppeKey][maskine] = createEmptyCodes();
                }

                grupper[gruppeKey][maskine][stopkode] += tid;
                parsedLines++;
            }

            if (parsedLines === 0) {
                errorEl.textContent = '⚠️ Ingen gyldige datarækker fundet. Format skal være: Dato [TAB] Maskine [TAB] Stopkode [TAB] Tid';
                errorEl.style.display = 'block';
                return;
            }

            sidsteBeregning = grupper;

            const gruppeNavne = Object.keys(grupper);

            for (const gruppe of gruppeNavne) {
                if (groupBy !== 'samlet') {
                    const title = document.createElement('div');
                    title.className = 'period-title';
                    title.textContent = gruppe;
                    resultContent.appendChild(title);
                }

                const kendteMaskiner = [];
                const ukendteMaskiner = [];

                for (const maskine in grupper[gruppe]) {
                    if (MASKINE_ORDER.includes(maskine)) {
                        kendteMaskiner.push(maskine);
                    } else {
                        ukendteMaskiner.push(maskine);
                    }
                }

                kendteMaskiner.sort((a, b) => MASKINE_ORDER.indexOf(a) - MASKINE_ORDER.indexOf(b));
                ukendteMaskiner.sort();

                const alleMaskiner = [...kendteMaskiner, ...ukendteMaskiner];

                for (const maskine of alleMaskiner) {
                    const h3 = document.createElement('h3');
                    h3.textContent = maskine;
                    resultContent.appendChild(h3);

                    const table = document.createElement('table');
                    const thead = document.createElement('thead');
                    thead.innerHTML = `
                        <tr>
                            <th>Stopkode</th>
                            <th>Beskrivelse</th>
                            <th>Tid (min)</th>
                        </tr>
                    `;
                    table.appendChild(thead);

                    const tbody = document.createElement('tbody');
                    let maskineTotal = 0;

                    for (let kode = 1; kode <= 16; kode++) {
                        const tid = grupper[gruppe][maskine][kode] || 0;
                        if (tid > 0) {
                            maskineTotal += tid;
                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                                <td>${kode}</td>
                                <td>${STOPKODER[kode]}</td>
                                <td>${tid}</td>
                            `;
                            tbody.appendChild(tr);
                        }
                    }

                    const totalTr = document.createElement('tr');
                    totalTr.className = 'total-row';
                    totalTr.innerHTML = `
                        <td colspan="2">TOTAL</td>
                        <td>${maskineTotal}</td>
                    `;
                    tbody.appendChild(totalTr);

                    table.appendChild(tbody);
                    resultContent.appendChild(table);
                }
            }

            ignoredInfo.textContent = `✅ ${parsedLines} rækker behandlet.${ignoredLines > 0 ? ' | ⏭️ ' + ignoredLines + ' rækker ignoreret.' : ''}`;
            resultSection.style.display = 'block';
            pdfBtn.style.display = 'inline-block';
        }

        function ryd() {
            document.getElementById('dataInput').value = '';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('pdfBtn').style.display = 'none';
            document.getElementById('resultContent').innerHTML = '';
            document.getElementById('ignoredInfo').textContent = '';
            sidsteBeregning = null;
        }

        function downloadPDF() {
            if (!sidsteBeregning) {
                alert('Beregn data først før du laver PDF.');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            let firstPage = true;

            const grupper = Object.keys(sidsteBeregning);

            for (const gruppe of grupper) {
                const kendteMaskiner = [];
                const ukendteMaskiner = [];

                for (const maskine in sidsteBeregning[gruppe]) {
                    if (MASKINE_ORDER.includes(maskine)) {
                        kendteMaskiner.push(maskine);
                    } else {
                        ukendteMaskiner.push(maskine);
                    }
                }

                kendteMaskiner.sort((a, b) => MASKINE_ORDER.indexOf(a) - MASKINE_ORDER.indexOf(b));
                ukendteMaskiner.sort();

                const alleMaskiner = [...kendteMaskiner, ...ukendteMaskiner];

                for (const maskine of alleMaskiner) {
                    if (!firstPage) doc.addPage();
                    firstPage = false;

                    doc.setFontSize(16);
                    doc.text('Stop Kode Beregner V2.2', 14, 15);

                    doc.setFontSize(12);
                    doc.text('Periode: ' + gruppe, 14, 25);
                    doc.text('Maskine: ' + maskine, 14, 32);

                    const body = [];
                    let total = 0;

                    for (let kode = 1; kode <= 16; kode++) {
                        const tid = sidsteBeregning[gruppe][maskine][kode] || 0;
                        if (tid > 0) {
                            total += tid;
                            body.push([String(kode), STOPKODER[kode], String(tid)]);
                        }
                    }

                    body.push(['', 'TOTAL', String(total)]);

                    doc.autoTable({
                        startY: 40,
                        head: [['Stopkode', 'Beskrivelse', 'Tid (min)']],
                        body: body,
                        theme: 'grid',
                        headStyles: { fillColor: [15, 52, 96] },
                        alternateRowStyles: { fillColor: [245, 245, 245] }
                    });
                }
            }

            doc.save('stopkode_beregner_v2_2.pdf');
        }
    </script>
</body>
</html>
